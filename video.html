<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<html lang="en"></html>
<title>VideoProject</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<script src="https://kit.fontawesome.com/ae355807dd.js" crossorigin="anonymous"></script>
<link href="https://fonts.google.com/icons?selected=Material%20Icons%20Outlined%3Alocal_bar%3A">
<style>

/* reset css*/

html, body, div, span, applet, object, iframe,
h1, h2, h3, h4, h5, h6, p, blockquote, pre,
a, abbr, acronym, address, big, cite, code,
del, dfn, em, img, ins, kbd, q, s, samp,
small, strike, strong, sub, sup, tt, var,
b, u, i, center,
dl, dt, dd, ol, ul, li,
fieldset, form, label, legend,
table, caption, tbody, tfoot, thead, tr, th, td,
article, aside, canvas, details, embed, 
figure, figcaption, footer, header, hgroup, 
menu, nav, output, ruby, section, summary,
time, mark, audio, video {
	margin: 0;
	padding: 0;
	border: 0;
	font-size: 100%;
	font: inherit;
	vertical-align: baseline;
}

article, aside, details, figcaption, figure, 
footer, header, hgroup, menu, nav, section {
	display: block;
}
body {
	line-height: 1;
}
ol, ul {
	list-style: none;
}
blockquote, q {
	quotes: none;
}
blockquote:before, blockquote:after,
q:before, q:after {
	content: '';
	content: none;
}
table {
	border-collapse: collapse;
	border-spacing: 0;
} 

/* sfarsit css reset*/




/* declaratii generale*/

html{
  font-size: 20px;
  font-family:  'Roboto', sans-serif;
}
* {box-sizing: border-box;}



/* continut*/

section{
    background: linear-gradient(to bottom, #000000 -15%, #66ff33 100%);
    width: 100%;
    height: 100vh;
}
iframe{
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
     border-radius: 5px;
     outline: 5px solid black;
     z-index: 99;
     box-shadow: 10px 10px 10px 10px #999900;
}

</style>
</head>
<body>

<section>

    <iframe width="560" height="315" src="https://www.youtube.com/embed/Dg18_1UY-e4" title="YouTube video player" frameborder="0"
     allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>

</section>


</body>
</html>
